name: Platform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint Helm Charts
        run: |
          helm lint helm-charts/tenant-app
          helm lint helm-charts/platform

      - name: Template Validation
        run: |
          for tenant in tenants/*.yaml; do
            name=$(basename "$tenant" .yaml)
            echo "Validating tenant: $name"
            helm template "tenant-$name" helm-charts/tenant-app -f "$tenant" > /dev/null
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kubesec Scan
        run: |
          for tenant in tenants/*.yaml; do
            name=$(basename "$tenant" .yaml)
            helm template "tenant-$name" helm-charts/tenant-app -f "$tenant" | \
              docker run -i kubesec/kubesec:v2 scan /dev/stdin || true
          done

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
