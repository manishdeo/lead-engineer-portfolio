{{- $tier := .Values.tenant.tier }}
{{- $quota := index .Values.quotas $tier }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-{{ .Values.tenant.name }}
spec:
  hard:
    requests.cpu: {{ $quota.cpu }}
    requests.memory: {{ $quota.memory }}
    limits.cpu: {{ $quota.cpu }}
    limits.memory: {{ $quota.memory }}
    pods: {{ $quota.pods }}
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-{{ .Values.tenant.name }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ .Values.limitRange.defaultCpu }}
        memory: {{ .Values.limitRange.defaultMemory }}
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: {{ .Values.limitRange.maxCpu }}
        memory: {{ .Values.limitRange.maxMemory }}
