monitoring:
  enabled: true

argocd:
  enabled: true

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
  grafana:
    adminPassword: <grafana-admin-password>
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            folder: Tenants
            type: file
            options:
              path: /var/lib/grafana/dashboards/default

argo-cd:
  server:
    extraArgs:
      - --insecure
  configs:
    params:
      server.insecure: true
