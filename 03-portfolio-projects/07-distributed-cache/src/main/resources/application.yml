server:
  port: 8080

cache:
  near:
    max-size: 10000
    ttl-seconds: 60
  eviction:
    policy: LRU    # LRU | LFU | TTL
    max-size: 100000
  hash-ring:
    virtual-nodes: 150
  redis:
    nodes: ${REDIS_NODES:localhost:6379,localhost:6380,localhost:6381}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    tags:
      application: distributed-cache

logging:
  level:
    com.maplehub.cache: DEBUG
