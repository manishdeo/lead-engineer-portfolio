name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build & Test
        run: ./mvnw clean verify -f backend/pom.xml
      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker build -t maplehub/analytics-backend:${{ github.sha }} backend/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: docker build -t maplehub/analytics-frontend:${{ github.sha }} frontend/
